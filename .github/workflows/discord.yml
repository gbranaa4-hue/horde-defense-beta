name: Discord Push Notify

on:
  push:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send Discord Notification
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          AUTHOR="${{ github.event.head_commit.author.name }}"
          MESSAGE="${{ github.event.head_commit.message }}"
          URL="${{ github.event.head_commit.url }}"

          FILES=$(jq -r '.commits[].modified[], .commits[].added[], .commits[].removed[]' <<< '${{ toJson(github.event) }}' | sort | uniq | head -n 10)

          FORMATTED_FILES=$(printf "%s\n" "$FILES")

          curl -H "Content-Type: application/json" \
          -d "{
            \"content\": \"🚀 **New Push Detected**\",
            \"embeds\": [{
              \"title\": \"Branch: $BRANCH\",
              \"url\": \"$URL\",
              \"description\": \"**Author:** $AUTHOR\n**Message:** $MESSAGE\",
              \"fields\": [
                {
                  \"name\": \"Changed Files (top 10)\",
                  \"value\": \"\`\`\`\n$FORMATTED_FILES\n\`\`\`\"
                }
              ]
            }]
          }" \
          $WEBHOOK
